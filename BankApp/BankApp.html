<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUR Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <header>
        <div class="header-left">
            <div class="logo-icon">O</div>
            <div>
                <h1>OUR Bank</h1>
                <p>Banking at Your Doorstep!</p>
            </div>
        </div>
        <div class="header-right d-none d-md-block">
            Mon - Sat &nbsp;|&nbsp; 9 AM - 6 PM<br>
            1800-000-1234 (Toll Free)
        </div>
    </header>

    <div class="main">
        <div class="side-nav-main d-none d-md-flex">
            <div class="nav-inner">
                <div class="nav-elem active" onclick="showHome(); setActive(this)">🏠 Home</div>
                <div class="nav-elem" onclick="showAboutUs(); setActive(this)">🌐 About Us</div>
                <div class="nav-elem" onclick="showServices(); setActive(this)">🏦 Services</div>
                <div class="nav-elem" onclick="showLogin(); setActive(this)">💳 eBanking</div>
                <div class="nav-elem" onclick="showContactUs(); setActive(this)">☎️ Contact Us</div>
            </div>
        </div>

        <div id="main-content" class="main-content"></div>

    </div>

    <nav class="bottom-nav d-flex d-md-none">
        <div class="bottom-nav-item active" onclick="showHome(); setBottomActive(this)">
            <span>🏠</span>
        </div>
        <div class="bottom-nav-item" onclick="showAboutUs(); setBottomActive(this)">
            <span>🌐</span>
        </div>
        <div class="bottom-nav-item" onclick="showServices(); setBottomActive(this)">
            <span>🏦</span>
        </div>
        <div class="bottom-nav-item" onclick="showLogin(); setBottomActive(this)">
            <span>💳</span>
        </div>
        <div class="bottom-nav-item" onclick="showContactUs(); setBottomActive(this)">
            <span>☎️</span>
        </div>
    </nav>

    <footer class="d-none d-md-flex">
        © 2026 OUR Bank &nbsp;·&nbsp; <span>help@ourbank.com</span> &nbsp;·&nbsp; All rights reserved
    </footer>
    <script src="Script.js"></script>
</body>

</html>
